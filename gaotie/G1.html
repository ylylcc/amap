<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.css"/>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.js"></script>

    <script src="https://amap.yanglichao.com/js/map-core.js"></script>
</head>
<body>
<div id="app" style="padding: 20px;">
    <t-space style="margin-bottom: 15px;">
        <t-button @click="changeToDark">深色模式</t-button>
        <t-button theme="primary" @click="markBeijing">标记北京</t-button>
    </t-space>

    <div id="map-container" style="height: 100%"></div>
</div>

<script>
    const {createApp, onMounted} = Vue;

    createApp({
        setup() {
            onMounted(async () => {
                // 调用方式非常简单
                await $map.init('map-container', {
                    zoom: 13
                });
            });

            const changeToDark = () => $map.setTheme('dark');

            const markBeijing = () => {
                $map.addMarker(116.397, 39.908, '天安门');
            };

            return {changeToDark, markBeijing};
        }
    }).use(TDesign).mount('#app');
</script>
</body>
</html>
