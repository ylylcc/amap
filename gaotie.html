<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.js"></script>
    <script src="https://unpkg.com/tdesign-icons-vue-next/dist/index.iife.js"></script>
    
    <style>
        body, html, #app { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        .main-container { display: flex; height: 100vh; }
        
        /* 侧边栏样式 */
        .side-panel {
            width: 160px;
            background: #f3f5f8;
            border-right: 1px solid #dcdfe6;
            display: flex;
            flex-direction: column;
        }

        .btn-list { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* 强制按钮文字左对齐，图标间距 */
        .menu-btn { justify-content: flex-start !important; }

        /* 地图区域 */
        #map-container { flex: 1; position: relative; background: #eaecf1; }
    </style>
</head>
<body>

<div id="app">
    <div class="main-container">
        <aside class="side-panel">
            <div style="padding: 20px; font-weight: bold; font-size: 16px;">工具箱</div>
            <div class="btn-list">
                <t-button class="menu-btn" variant="base" @click="handle('add')">
                    <template #icon><t-icon name="add" /></template>新增
                </t-button>
                <t-button class="menu-btn" variant="base" @click="handle('search')">
                    <template #icon><t-icon name="search" /></template>搜索
                </t-button>
                <t-button class="menu-btn" variant="base" @click="handle('delete')" theme="danger" variant="outline">
                    <template #icon><t-icon name="delete" /></template>清空
                </t-button>
            </div>
        </aside>

        <main id="map-container">
            </main>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        setup() {
            const handle = (type) => {
                // 直接调用你服务器上混淆后的工具库
                // $map.doSomething(type);
                TDesign.MessagePlugin.success('操作成功：' + type);
            };
            return { handle };
        }
    }).use(TDesign).mount('#app');
</script>

</body>
</html>
